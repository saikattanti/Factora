name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build-and-test-contracts:
    name: Build & Test Soroban Contracts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install Rust 1.82 (compatible with ethnum v1.5)
        uses: dtolnay/rust-toolchain@1.82
        with:
          targets: wasm32-unknown-unknown

      - name: Build invoice-factoring
        working-directory: ./contracts/invoice-factoring
        run: cargo build --target wasm32-unknown-unknown --release

      - name: Test invoice-factoring
        working-directory: ./contracts/invoice-factoring
        run: cargo test

      - name: Build admin-registry
        working-directory: ./contracts/admin-registry
        run: cargo build --target wasm32-unknown-unknown --release

      - name: Test admin-registry
        working-directory: ./contracts/admin-registry
        run: cargo test

  build-and-test-frontend:
    name: Build & Test Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run Linter
        run: npm run lint

      - name: Run Tests
        run: npm run test

      - name: Build Frontend
        run: npm run build
        env:
          NEXT_PUBLIC_SOROBAN_RPC_URL: https://soroban-testnet.stellar.org
          NEXT_PUBLIC_HORIZON_URL: https://horizon-testnet.stellar.org
          NEXT_PUBLIC_CONTRACT_ADDRESS: CDJGXXABINDCQH6ZP35S2V6WFXEK2O5LINUUMWOJDPAKMWY2Q5WETGFB
          NEXT_PUBLIC_REGISTRY_ADDRESS: CCESJJH4JPAUP7J6Z57JUTKJEQSDPUMFICTLXHCEY7CVGGJRUMZZF5GC
