name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build-and-test-contracts:
    name: Build & Test Soroban Contracts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Build invoice-factoring
        working-directory: ./contracts/invoice-factoring
        run: cargo build --target wasm32-unknown-unknown --release

      - name: Test invoice-factoring
        working-directory: ./contracts/invoice-factoring
        run: cargo test

      - name: Build admin-registry
        working-directory: ./contracts/admin-registry
        run: cargo build --target wasm32-unknown-unknown --release

      - name: Test admin-registry
        working-directory: ./contracts/admin-registry
        run: cargo test

  build-and-test-frontend:
    name: Build & Test Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Linter
        run: npm run lint

      - name: Run Tests
        run: npm run test

      - name: Build Frontend
        run: npm run build
